name: CI
on:
  push:
    branches: ["main", "dev"]
  pull_request:
    types: [opened, synchronize]

env:
  NUXT_PUBLIC_APP_ENV: 'test'
  NUXT_PUBLIC_STORE_URL: 'http://localhost:3005'
  NUXT_PUBLIC_SHOPWARE_DEV_STORE_FRONT_URL: 'http://localhost:3005'
  PORT: '3005'
  NUXT_PUBLIC_SHOPWARE_ENDPOINT: ${{ secrets.NUXT_PUBLIC_SHOPWARE_ENDPOINT }}
  NUXT_PUBLIC_SHOPWARE_ACCESS_TOKEN: ${{ secrets.NUXT_PUBLIC_SHOPWARE_ACCESS_TOKEN }}
  NUXT_PUBLIC_SITE_COUNTRY_ID: ${{ secrets.NUXT_PUBLIC_SITE_COUNTRY_ID }}
  GEOPIFY: ${{ secrets.GEOPIFY }}

jobs:
  setup:
    name: Install & Build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Rebuild native modules
        run: pnpm rebuild better-sqlite3

      - name: Save node_modules to cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
          key: deps-${{ runner.os }}-${{ github.sha }}

      - name: Build
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .output
            .nuxt
          retention-days: 1

  unit-test:
    name: Unit tests
    environment: test
    needs: [setup]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore node_modules from cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
          key: deps-${{ runner.os }}-${{ github.sha }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Unit tests
        run: pnpm test:unit

  e2e-test:
    name: E2E tests
    environment: test
    needs: [setup]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore node_modules from cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
          key: deps-${{ runner.os }}-${{ github.sha }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        env:
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_USER_PASS: ${{ secrets.TEST_USER_PASS }}
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
